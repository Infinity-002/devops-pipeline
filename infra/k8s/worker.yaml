apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: task-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: task-system-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: task-system-config

