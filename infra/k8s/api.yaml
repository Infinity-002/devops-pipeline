apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: task-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: task-system-api:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: task-system-config
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: task-system
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000

