name: ci

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync Python dependencies
        run: uv sync --all-packages

      - name: Lint Python
        run: uv run ruff check .

      - name: Run Python tests
        run: uv run pytest

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install frontend dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build frontend
        working-directory: web
        run: bun run build

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint ./charts/task-system

      - name: Build API image
        run: docker build -f services/api/Dockerfile -t task-system-api:ci .

      - name: Build worker image
        run: docker build -f services/worker/Dockerfile -t task-system-worker:ci .

      - name: Build web image
        run: docker build -f web/Dockerfile -t task-system-web:ci .

