name: deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  RELEASE_NAME: task-system
  KUBE_NAMESPACE: task-system
  GHCR_PULL_SECRET_NAME: ${{ vars.GHCR_PULL_SECRET_NAME }}

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync Python dependencies
        run: uv sync --all-packages

      - name: Lint Python
        run: uv run ruff check .

      - name: Run Python tests
        run: uv run pytest

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install frontend dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build frontend
        working-directory: web
        run: bun run build

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint ./charts/task-system

  build-and-push:
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      image_tag: ${{ steps.image-tag.outputs.image_tag }}
      image_namespace: ${{ steps.image-namespace.outputs.image_namespace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image namespace
        id: image-namespace
        run: echo "image_namespace=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Compute image tag
        id: image-tag
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image-namespace.outputs.image_namespace }}/task-system-api:${{ steps.image-tag.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ steps.image-namespace.outputs.image_namespace }}/task-system-api:latest

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/worker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image-namespace.outputs.image_namespace }}/task-system-worker:${{ steps.image-tag.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ steps.image-namespace.outputs.image_namespace }}/task-system-worker:latest

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image-namespace.outputs.image_namespace }}/task-system-web:${{ steps.image-tag.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ steps.image-namespace.outputs.image_namespace }}/task-system-web:latest

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig from secret when provided
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          if [ -z "${KUBE_CONFIG_DATA}" ]; then
            echo "KUBE_CONFIG_DATA not set; using runner's existing kubectl context."
            exit 0
          fi
          mkdir -p "${HOME}/.kube"
          echo "${KUBE_CONFIG_DATA}" | base64 --decode > "${HOME}/.kube/config"
          chmod 600 "${HOME}/.kube/config"

      - name: Verify cluster access
        run: |
          kubectl config current-context
          kubectl get nodes

      - name: Create namespace if needed
        run: kubectl create namespace "${KUBE_NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm
        run: |
          EXTRA_HELM_ARGS=""
          if [ -n "${GHCR_PULL_SECRET_NAME}" ]; then
            EXTRA_HELM_ARGS="${EXTRA_HELM_ARGS} --set imagePullSecrets[0].name=${GHCR_PULL_SECRET_NAME}"
          fi

          helm upgrade --install "${RELEASE_NAME}" ./charts/task-system \
            --namespace "${KUBE_NAMESPACE}" \
            --create-namespace \
            --set namespace="${KUBE_NAMESPACE}" \
            --set api.image.repository="${REGISTRY}/${{ needs.build-and-push.outputs.image_namespace }}/task-system-api" \
            --set api.image.tag="${{ needs.build-and-push.outputs.image_tag }}" \
            --set worker.image.repository="${REGISTRY}/${{ needs.build-and-push.outputs.image_namespace }}/task-system-worker" \
            --set worker.image.tag="${{ needs.build-and-push.outputs.image_tag }}" \
            --set web.image.repository="${REGISTRY}/${{ needs.build-and-push.outputs.image_namespace }}/task-system-web" \
            --set web.image.tag="${{ needs.build-and-push.outputs.image_tag }}" \
            ${EXTRA_HELM_ARGS}
